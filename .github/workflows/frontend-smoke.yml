name: Frontend Smoke Test (Docker Compose)

on:
  workflow_call:
    inputs:
      repository_path:
        required: true
        type: string
        description: 'Absolute path to the repository on the self-hosted runner'
      docker_compose_file:
        required: true
        type: string
        description: 'Path to docker compose file relative to repository root'
      working_directory:
        required: false
        type: string
        description: 'Working directory for docker compose commands (defaults to repository_path)'
      service_name:
        required: true
        type: string
        description: 'Frontend service name to smoke-test (e.g. homeui)'
      healthcheck_url:
        required: true
        type: string
        description: 'URL to check for successful response (usually http://localhost:8000)'
      max_retries:
        required: false
        type: number
        default: 24
        description: 'Maximum number of healthcheck attempts before failing'
      retry_delay_seconds:
        required: false
        type: number
        default: 5
        description: 'Delay between healthcheck attempts in seconds'
      enable_notifications:
        required: false
        type: boolean
        default: false
        description: 'Whether to send notifications via send-notification workflow on smoke test failure'
      notification_recipients:
        required: false
        type: string
        default: '["gregor160505@gmail.com"]'
        description: 'JSON array of email addresses for failure notifications'
    secrets:
      GMAIL_APP_PASSWORD:
        required: false
        description: 'Gmail App Password for SMTP authentication (used for failure notifications)'
      DISCORD_BOT_TOKEN:
        required: false
        description: 'Discord bot token (used for failure notifications)'
      PAT_GITHUB:
        required: false
        description: 'Personal Access Token to clone private repos (optional, used by send-notification workflow)'

jobs:
  smoke:
    runs-on: self-hosted

    steps:
      - name: Log smoke test inputs
        run: |
          echo "Repository path: ${{ inputs.repository_path }}"
          echo "Docker compose file: ${{ inputs.docker_compose_file }}"
          echo "Service name: ${{ inputs.service_name }}"
          echo "Working directory: ${{ inputs.working_directory || 'repository root' }}"
          echo "Healthcheck URL: ${{ inputs.healthcheck_url }}"
          echo "Max retries: ${{ inputs.max_retries }}"
          echo "Retry delay (seconds): ${{ inputs.retry_delay_seconds }}"

      - name: Set working directory
        id: set_workdir
        run: |
          if [ -n "${{ inputs.working_directory }}" ]; then
            WORKDIR="${{ inputs.repository_path }}/${{ inputs.working_directory }}"
          else
            WORKDIR="${{ inputs.repository_path }}"
          fi

          echo "🔧 Setting working directory: $WORKDIR"
          echo "workdir=$WORKDIR" >> $GITHUB_OUTPUT

          if [ ! -d "$WORKDIR" ]; then
            echo "❌ ERROR: Working directory does not exist!"
            exit 1
          fi
          echo "✅ Working directory verified"

      - name: Verify docker compose file
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🔍 Verifying docker compose file for smoke test..."
          COMPOSE_FILE="${{ inputs.docker_compose_file }}"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "❌ ERROR: Docker compose file not found: $COMPOSE_FILE"
            exit 1
          fi

          echo "✅ Docker compose file exists: $COMPOSE_FILE"
          echo "📄 File contents preview:"
          head -n 20 "$COMPOSE_FILE"

      - name: Start frontend service via docker compose
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🚀 Starting frontend service for smoke test..."
          docker compose -f ${{ inputs.docker_compose_file }} up -d --build --force-recreate --remove-orphans ${{ inputs.service_name }}
          echo "✅ Frontend service started (docker compose up -d)."

      - name: Wait for service to become healthy via HTTP
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          URL="${{ inputs.healthcheck_url }}"
          MAX_RETRIES=${{ inputs.max_retries }}
          DELAY=${{ inputs.retry_delay_seconds }}

          echo "⏳ Waiting for service to become healthy at $URL ..."

          attempt=1
          while [ "$attempt" -le "$MAX_RETRIES" ]; do
            echo "Attempt $attempt of $MAX_RETRIES..."
            if curl -fsS "$URL" > /dev/null; then
              echo "✅ Smoke check succeeded: $URL is responding."
              exit 0
            fi

            echo "Service not ready yet, sleeping ${DELAY}s..."
            sleep "$DELAY"
            attempt=$((attempt + 1))
          done

          echo "❌ Smoke check failed: service did not become healthy after $MAX_RETRIES attempts."
          exit 1

      - name: Show container status and logs
        if: always()
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "📊 Container status after smoke test:"
          docker compose -f ${{ inputs.docker_compose_file }} ps ${{ inputs.service_name }} || echo "⚠️  Service not running"

          echo "📋 Recent logs for service ${{ inputs.service_name }}:"
          docker compose -f ${{ inputs.docker_compose_file }} logs --tail=50 ${{ inputs.service_name }} || echo "⚠️  Unable to fetch logs"

  notify-on-failure:
    needs: smoke
    if: ${{ failure() && inputs.enable_notifications }}
    uses: ./.github/workflows/send-notification.yml
    with:
      enable_email: true
      enable_discord: true
      recipients: ${{ inputs.notification_recipients }}
      subject: >-
        ❌ Frontend smoke test failed in ${{ github.repository }}
      workflow_status: 'failure'
      workflow_name: ${{ github.workflow }}
      repository_name: ${{ github.repository }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      custom_body_html: >-
        <p>Frontend smoke test failed for <strong>${{ github.repository }}</strong>.</p>
        <p>Service <code>${{ inputs.service_name }}</code> at <code>${{ inputs.healthcheck_url }}</code> did not become healthy in time.</p>
        <p>Workflow: <code>${{ github.workflow }}</code><br/>
        Run: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View details</a></p>
    secrets:
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
