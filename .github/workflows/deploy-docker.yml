name: Deploy Docker Service

on:
  workflow_call:
    inputs:
      docker_compose_file:
        required: false
        type: string
        default: "docker-compose.yaml"
        description: "Path to docker compose file relative to repository root"
      service_name:
        required: false
        type: string
        description: "Specific service name to restart (optional, if not provided restarts all services)"
      working_directory:
        required: false
        type: string
        description: "Subdirectory within the repo where docker compose commands run (defaults to repo root)"
      boot_script:
        required: false
        type: string
        description: "Path to a boot/deploy script relative to repository root (optional, replaces default docker compose stop/up/cleanup steps)"
      environment:
        required: false
        type: string
        default: "prod"
        description: "Target environment (dev or prod)"
      image:
        required: false
        type: string
        description: "Registry image to pull (e.g. registry.922-studio.com/drafter:dev). When provided, skips build and does docker compose pull + up."
      deploy_target:
        required: false
        type: string
        default: "antares"
        description: "Target server whose Docker daemon boots the containers: antares (default) | polaris | upsilon. Sets DOCKER_HOST to ssh://lab@astro-<target> (polaris = the local runner daemon)."
      env_file_source:
        required: false
        type: string
        description: "Absolute path on the deploy_target host to a .env file, fetched via SCP into the working directory as .env before compose runs. Required for services whose compose relies on an untracked .env (e.g. CONTAINER_PREFIX/IMAGE_TAG) so a dev deploy does not fall back to prod defaults."
    secrets:
      PAT_GITHUB:
        required: false
        description: "Personal Access Token for private repos (optional)"
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  deploy:
    runs-on: polaris
    steps:
      - name: Log deployment start
        run: |
          echo "=========================================="
          echo "Starting Docker Deployment"
          echo "=========================================="
          echo "Environment: ${{ inputs.environment }}"
          echo "Docker Compose File: ${{ inputs.docker_compose_file }}"
          echo "Service Name: ${{ inputs.service_name || 'ALL SERVICES' }}"
          echo "Working Directory: ${{ inputs.working_directory || 'repository root' }}"
          echo "Boot Script: ${{ inputs.boot_script || 'none (using default docker compose steps)' }}"
          echo "Registry Image: ${{ inputs.image || 'none (using local build)' }}"
          echo "Deploy Target: ${{ inputs.deploy_target }}"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="

      - name: Resolve deploy target (DOCKER_HOST)
        id: target
        run: |
          case "${{ inputs.deploy_target }}" in
            polaris) DH="" ;;                          # local runner daemon (polaris)
            upsilon) DH="ssh://lab@astro-upsilon" ;;
            antares|*) DH="ssh://lab@astro-antares" ;; # default
          esac
          echo "docker_host=$DH" >> "$GITHUB_OUTPUT"
          echo "🎯 deploy_target='${{ inputs.deploy_target }}' -> DOCKER_HOST='${DH:-<local polaris daemon>}'"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_GITHUB }}

      - name: Set working directory
        id: set_workdir
        run: |
          if [ -n "${{ inputs.working_directory }}" ]; then
            WORKDIR="${GITHUB_WORKSPACE}/${{ inputs.working_directory }}"
          else
            WORKDIR="${GITHUB_WORKSPACE}"
          fi

          echo "🔧 Setting working directory: $WORKDIR"
          echo "workdir=$WORKDIR" >> $GITHUB_OUTPUT

          if [ ! -d "$WORKDIR" ]; then
            echo "❌ ERROR: Working directory does not exist!"
            exit 1
          fi
          echo "✅ Working directory verified"

      - name: Verify docker compose file
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🔍 Verifying docker compose file..."
          COMPOSE_FILE="${{ inputs.docker_compose_file }}"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "❌ ERROR: Docker compose file not found: $COMPOSE_FILE"
            exit 1
          fi

          echo "✅ Docker compose file exists: $COMPOSE_FILE"
          echo "📄 File contents preview:"
          head -n 20 "$COMPOSE_FILE"

      - name: Fetch .env from target host via SCP
        if: inputs.env_file_source != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          ENV_SOURCE="${{ inputs.env_file_source }}"
          echo "📋 Fetching .env from lab@astro-${{ inputs.deploy_target }}:${ENV_SOURCE}..."
          # Land it as .env in the working dir so `docker compose` auto-loads it for
          # ${VAR} interpolation (CONTAINER_PREFIX, IMAGE_TAG, ports, Traefik host).
          # Without this a dev deploy would fall back to the compose prod defaults.
          # The checkout is ephemeral, so writing .env here is safe.
          scp -o StrictHostKeyChecking=accept-new \
            -i /home/lab/.ssh/id_ed25519 \
            "lab@astro-${{ inputs.deploy_target }}:${ENV_SOURCE}" \
            .env
          echo "✅ .env fetched"

      - name: Show current container status
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "📊 Current container status:"
          if [ -n "${{ inputs.service_name }}" ]; then
            docker compose -f ${{ inputs.docker_compose_file }} ps ${{ inputs.service_name }} || echo "⚠️  Service not running"
          else
            docker compose -f ${{ inputs.docker_compose_file }} ps || echo "⚠️  No containers running"
          fi
        continue-on-error: true

      # --- Default docker compose path (no boot_script) ---

      - name: Stop existing containers
        if: inputs.boot_script == '' && inputs.image == ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "🛑 Stopping existing containers..."

          if [ -n "${{ inputs.service_name }}" ]; then
            echo "Stopping service: ${{ inputs.service_name }}"
            docker compose -f ${{ inputs.docker_compose_file }} rm -sf ${{ inputs.service_name }} || echo "⚠️  Service not running"
          else
            echo "Stopping all services..."
            docker compose -f ${{ inputs.docker_compose_file }} down || echo "⚠️  No services running"
          fi
          echo "✅ Stop completed"
        continue-on-error: true

      - name: Deploy with zero-downtime rolling update
        if: inputs.boot_script == '' && inputs.image == ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "🚀 Deploying with rolling update (zero downtime)..."
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"

          if [ -n "${{ inputs.service_name }}" ]; then
            echo "Deploying service: ${{ inputs.service_name }}"
            docker compose -f ${{ inputs.docker_compose_file }} up -d --build --force-recreate --remove-orphans --no-deps --wait --wait-timeout 120 ${{ inputs.service_name }}
            echo "✅ Service deployed and healthy"
          else
            echo "Deploying all services..."
            docker compose -f ${{ inputs.docker_compose_file }} up -d --build --force-recreate --remove-orphans --wait --wait-timeout 120
            echo "✅ All services deployed and healthy"
          fi

      - name: Clean up old images
        if: inputs.boot_script == '' && inputs.image == ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "🧹 Removing dangling images..."
          docker image prune -f || true
          echo "✅ Cleanup completed"
        continue-on-error: true

      # --- Registry pull path (image input provided) ---

      - name: Registry login
        if: inputs.image != ''
        run: |
          echo "🔐 Logging in to Docker registry..."
          REGISTRY=$(echo "${{ inputs.image }}" | cut -d'/' -f1)
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "$REGISTRY" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          echo "✅ Registry login successful"

      - name: Pull image from registry
        if: inputs.image != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "📥 Pulling image: ${{ inputs.image }}"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"

          if [ -n "${{ inputs.service_name }}" ]; then
            docker compose -f ${{ inputs.docker_compose_file }} pull ${{ inputs.service_name }}
          else
            docker compose -f ${{ inputs.docker_compose_file }} pull
          fi
          echo "✅ Image pull completed"

      - name: Deploy pulled image
        if: inputs.image != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "🚀 Deploying pulled image..."
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"

          if [ -n "${{ inputs.service_name }}" ]; then
            echo "Deploying service: ${{ inputs.service_name }}"
            docker compose -f ${{ inputs.docker_compose_file }} up -d --wait --wait-timeout 120 --no-deps ${{ inputs.service_name }}
            echo "✅ Service deployed and healthy"
          else
            echo "Deploying all services..."
            docker compose -f ${{ inputs.docker_compose_file }} up -d --wait --wait-timeout 120
            echo "✅ All services deployed and healthy"
          fi

      - name: Clean up old images (registry pull)
        if: inputs.image != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "🧹 Removing dangling images..."
          docker image prune -f || true
          echo "✅ Cleanup completed"
        continue-on-error: true

      # --- Boot script path ---

      - name: Run boot script
        if: inputs.boot_script != ''
        working-directory: ${{ github.workspace }}
        run: |
          echo "🚀 Running boot script: ${{ inputs.boot_script }}"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"

          SCRIPT_PATH="${{ inputs.boot_script }}"

          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "❌ ERROR: Boot script not found: $SCRIPT_PATH"
            exit 1
          fi

          chmod +x "$SCRIPT_PATH"
          ./"$SCRIPT_PATH" ${{ inputs.environment }}
          echo "✅ Boot script completed"

      # --- Verify (always runs regardless of path) ---

      - name: Verify deployment
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "✅ Verifying deployment status..."

          if [ -n "${{ inputs.service_name }}" ]; then
            echo "Checking service: ${{ inputs.service_name }}"
            docker compose -f ${{ inputs.docker_compose_file }} ps ${{ inputs.service_name }}

            STATUS=$(docker compose -f ${{ inputs.docker_compose_file }} ps -q ${{ inputs.service_name }} | xargs docker inspect -f '{{.State.Status}}' 2>/dev/null || echo "unknown")
            echo "Container status: $STATUS"

            if [ "$STATUS" != "running" ]; then
              echo "❌ ERROR: Container is not running!"
              exit 1
            fi
          else
            echo "Checking all services:"
            docker compose -f ${{ inputs.docker_compose_file }} ps
          fi

          echo "✅ Deployment verification successful"

      - name: Show container logs
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "📋 Recent container logs:"
          if [ -n "${{ inputs.service_name }}" ]; then
            docker compose -f ${{ inputs.docker_compose_file }} logs --tail=30 ${{ inputs.service_name }}
          else
            docker compose -f ${{ inputs.docker_compose_file }} logs --tail=30
          fi

      - name: Show logs on failure
        if: failure()
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        env:
          DOCKER_HOST: ${{ steps.target.outputs.docker_host }}
        run: |
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "📋 Full container logs:"

          if [ -n "${{ inputs.service_name }}" ]; then
            docker compose -f ${{ inputs.docker_compose_file }} logs --tail=100 ${{ inputs.service_name }}
          else
            docker compose -f ${{ inputs.docker_compose_file }} logs --tail=100
          fi

          echo ""
          echo "📊 Container status:"
          docker compose -f ${{ inputs.docker_compose_file }} ps

          echo ""
          echo "🔍 Docker system info:"
          docker system df

      - name: Log deployment success
        if: success()
        run: |
          ENV_UPPER=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          echo "=========================================="
          echo "✅ [$ENV_UPPER] DEPLOYMENT SUCCESSFUL"
          echo "=========================================="
          echo "Environment: ${{ inputs.environment }}"
          echo "Service: ${{ inputs.service_name || 'ALL SERVICES' }}"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
