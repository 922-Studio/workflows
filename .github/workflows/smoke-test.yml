name: Smoke Test (Docker Compose)

on:
  workflow_call:
    inputs:
      repository_path:
        required: true
        type: string
        description: 'Absolute path to the repository on the self-hosted runner'
      docker_compose_file:
        required: false
        type: string
        default: 'docker-compose.yaml'
        description: 'Path to docker compose file relative to repository root'
      working_directory:
        required: false
        type: string
        description: 'Working directory for docker compose commands (defaults to repository_path)'
      expected_services:
        required: false
        type: string
        description: 'Comma-separated list of expected service names (e.g. "db,api,redis,worker"). If omitted, discovers all services from compose file'
      healthcheck_endpoints:
        required: false
        type: string
        description: 'JSON map of service→container_port:path for HTTP health checks (e.g. {"api":"8080:/health"}). Ports are resolved dynamically since smoke uses random host ports.'
        default: '{}'
      migration_service:
        required: false
        type: string
        description: 'Service name that runs DB migrations on startup (checks logs for migration success/failure)'
      migration_success_pattern:
        required: false
        type: string
        default: 'Running upgrade'
        description: 'Log pattern indicating migrations ran (grep pattern)'
      migration_failure_patterns:
        required: false
        type: string
        default: 'alembic.util.exc|FAILED|sqlalchemy.exc|relation .* already exists'
        description: 'Log patterns indicating migration failure (grep -E pattern)'
      max_retries:
        required: false
        type: number
        default: 30
        description: 'Maximum healthcheck attempts before failing'
      retry_delay_seconds:
        required: false
        type: number
        default: 5
        description: 'Delay between healthcheck attempts in seconds'
      pull_code:
        required: false
        type: boolean
        default: true
        description: 'Whether to pull latest code before building (default: true)'
      env_file_source:
        required: false
        type: string
        description: 'Path to .env file to copy into the working directory for smoke containers (e.g. /home/lab/MyProject/.env)'
      runner:
        required: false
        type: string
        default: 'self-hosted'
        description: 'Runner label to target (e.g. "self-hosted" or "home-lab"). Use a specific label to pin the job to the host that has the deployment directory.'
    secrets:
      PAT_GITHUB:
        required: false
        description: 'Personal Access Token for private repos (optional, used for git pull)'
    outputs:
      result:
        description: 'Smoke test result: "passed" or "failed"'
        value: ${{ jobs.smoke.outputs.result }}

jobs:
  smoke:
    runs-on: ${{ inputs.runner }}
    outputs:
      result: ${{ steps.summary.outputs.result }}

    env:
      SMOKE_PROJECT: smoke-${{ github.run_id }}

    steps:
      - name: 📋 Log smoke test configuration
        run: |
          echo "=========================================="
          echo "🔬 Smoke Test Configuration"
          echo "=========================================="
          echo "Repository path: ${{ inputs.repository_path }}"
          echo "Docker compose file: ${{ inputs.docker_compose_file }}"
          echo "Working directory: ${{ inputs.working_directory || 'repository root' }}"
          echo "Expected services: ${{ inputs.expected_services || 'auto-discover' }}"
          echo "Healthcheck endpoints: ${{ inputs.healthcheck_endpoints }}"
          echo "Migration service: ${{ inputs.migration_service || 'none' }}"
          echo "Pull code: ${{ inputs.pull_code }}"
          echo "Smoke project: $SMOKE_PROJECT"
          echo "=========================================="

      - name: 🔧 Set working directory
        id: set_workdir
        run: |
          if [ -n "${{ inputs.working_directory }}" ]; then
            WORKDIR="${{ inputs.repository_path }}/${{ inputs.working_directory }}"
          else
            WORKDIR="${{ inputs.repository_path }}"
          fi

          echo "workdir=$WORKDIR" >> $GITHUB_OUTPUT

          if [ ! -d "$WORKDIR" ]; then
            echo "❌ ERROR: Working directory does not exist: $WORKDIR"
            exit 1
          fi
          echo "✅ Working directory verified: $WORKDIR"

      - name: 📥 Pull latest code
        if: inputs.pull_code
        working-directory: ${{ inputs.repository_path }}
        run: |
          echo "📥 Pulling latest changes..."

          # Configure PAT if provided
          REMOTE_URL=$(git config --get remote.origin.url)
          if [[ "$REMOTE_URL" == https://* ]] && [ -n "${{ secrets.PAT_GITHUB }}" ]; then
            REPO_PATH=$(echo "$REMOTE_URL" | sed 's|https://github.com/||')
            git remote set-url origin "https://x-access-token:${{ secrets.PAT_GITHUB }}@github.com/$REPO_PATH"
          fi

          git fetch origin
          git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

          echo "✅ Now at commit: $(git rev-parse --short HEAD)"
          echo "   $(git log -1 --pretty=%B | head -1)"

          # Clean up credentials
          if [[ "$(git config --get remote.origin.url)" == *"x-access-token"* ]]; then
            REPO_PATH=$(echo "$(git config --get remote.origin.url)" | sed 's|https://x-access-token:.*@github.com/||')
            git remote set-url origin "https://github.com/$REPO_PATH"
          fi

      - name: 🔍 Verify docker compose file
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          COMPOSE_FILE="${{ inputs.docker_compose_file }}"
          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "❌ ERROR: Docker compose file not found: $COMPOSE_FILE"
            exit 1
          fi
          echo "✅ Docker compose file exists: $COMPOSE_FILE"

      - name: 📋 Copy env file for smoke containers
        if: inputs.env_file_source != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          SRC="${{ inputs.env_file_source }}"
          if [ -f "$SRC" ]; then
            cp "$SRC" .env.smoke
            echo "✅ Copied env file from $SRC to .env.smoke"
          else
            echo "⚠️  Env file not found at $SRC, skipping"
          fi

      - name: 📦 Checkout workflows repo
        uses: actions/checkout@v5
        with:
          repository: 922-Studio/workflows
          ref: main
          path: .workflows
          token: ${{ secrets.PAT_GITHUB }}

      - name: 🔧 Generate isolated smoke compose config
        id: generate
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🔧 Generating isolated compose config..."

          python3 "${{ github.workspace }}/.workflows/.github/scripts/generate_smoke_compose.py" \
            --compose-file "${{ inputs.docker_compose_file }}" \
            --output smoke-compose.json \
            --project "$SMOKE_PROJECT"

          echo "smoke_compose=smoke-compose.json" >> $GITHUB_OUTPUT

      - name: 🐳 Discover services
        id: discover
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          if [ -n "${{ inputs.expected_services }}" ]; then
            SERVICES="${{ inputs.expected_services }}"
            echo "📋 Using provided service list: $SERVICES"
          else
            SERVICES=$(docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json config --services | tr '\n' ',' | sed 's/,$//')
            echo "📋 Auto-discovered services: $SERVICES"
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

      - name: 🏗️ Build smoke images
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🏗️ Building images for smoke test..."
          docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json build
          echo "✅ All images built successfully"

      - name: 🚀 Start isolated smoke stack
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🚀 Starting isolated smoke stack (project: $SMOKE_PROJECT)..."
          docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json up -d --wait --wait-timeout 120
          echo "✅ Smoke stack started"
          echo ""
          echo "📊 Container status:"
          docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json ps

      - name: 🏃 Check all containers are running
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          SERVICES="${{ steps.discover.outputs.services }}"
          FAILED=0

          echo "📊 Checking container status for all services..."
          echo ""

          IFS=',' read -ra SVC_LIST <<< "$SERVICES"
          for svc in "${SVC_LIST[@]}"; do
            svc=$(echo "$svc" | xargs)

            CONTAINER_ID=$(docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json ps -q "$svc" 2>/dev/null)

            if [ -z "$CONTAINER_ID" ]; then
              echo "❌ $svc — no container found (not started or crashed on startup)"
              FAILED=$((FAILED + 1))
              continue
            fi

            STATE=$(docker inspect -f '{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "unknown")

            if [ "$STATE" = "running" ]; then
              echo "✅ $svc — running"
            elif [ "$STATE" = "restarting" ]; then
              echo "⚠️  $svc — restarting (possible crash loop)"
              FAILED=$((FAILED + 1))
            else
              echo "❌ $svc — $STATE"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED service(s) not running correctly"
            exit 1
          fi
          echo "✅ All services are running"

      - name: 💚 Check Docker health status
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          SERVICES="${{ steps.discover.outputs.services }}"
          MAX_RETRIES=${{ inputs.max_retries }}
          DELAY=${{ inputs.retry_delay_seconds }}
          FAILED=0

          echo "💚 Checking Docker health status..."
          echo ""

          IFS=',' read -ra SVC_LIST <<< "$SERVICES"
          for svc in "${SVC_LIST[@]}"; do
            svc=$(echo "$svc" | xargs)
            CONTAINER_ID=$(docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json ps -q "$svc" 2>/dev/null)

            if [ -z "$CONTAINER_ID" ]; then
              continue
            fi

            HAS_HEALTHCHECK=$(docker inspect -f '{{if .State.Health}}yes{{else}}no{{end}}' "$CONTAINER_ID" 2>/dev/null || echo "no")

            if [ "$HAS_HEALTHCHECK" = "no" ]; then
              echo "⏭️  $svc — no healthcheck configured, skipping"
              continue
            fi

            echo -n "⏳ $svc — waiting for healthy"
            attempt=1
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              HEALTH=$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "unknown")

              if [ "$HEALTH" = "healthy" ]; then
                echo ""
                echo "✅ $svc — healthy"
                break
              elif [ "$HEALTH" = "unhealthy" ]; then
                echo ""
                echo "❌ $svc — unhealthy"
                echo "   Last health log:"
                docker inspect -f '{{range .State.Health.Log}}{{.Output}}{{end}}' "$CONTAINER_ID" 2>/dev/null | tail -5
                FAILED=$((FAILED + 1))
                break
              fi

              echo -n "."
              sleep "$DELAY"
              attempt=$((attempt + 1))
            done

            if [ "$attempt" -gt "$MAX_RETRIES" ] && [ "$HEALTH" != "healthy" ]; then
              echo ""
              echo "❌ $svc — did not become healthy after $MAX_RETRIES attempts (status: $HEALTH)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED service(s) failed Docker healthcheck"
            exit 1
          fi
          echo "✅ All healthchecked services are healthy"

      - name: 🗃️ Check database migrations
        if: inputs.migration_service != ''
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          SVC="${{ inputs.migration_service }}"
          SUCCESS_PATTERN="${{ inputs.migration_success_pattern }}"
          FAILURE_PATTERNS="${{ inputs.migration_failure_patterns }}"

          echo "🗃️ Checking migration status for service: $SVC"
          echo ""

          LOGS=$(docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json logs --tail=200 "$SVC" 2>&1)

          # Check for failure patterns first
          if echo "$LOGS" | grep -qE "$FAILURE_PATTERNS"; then
            echo "❌ Migration failure detected in $SVC logs!"
            echo ""
            echo "Matching lines:"
            echo "$LOGS" | grep -E "$FAILURE_PATTERNS" || true
            echo ""
            echo "📋 Full migration-related logs:"
            echo "$LOGS" | grep -iE "migration|alembic|upgrade|database|schema" || true
            exit 1
          fi

          # Check for success pattern
          if echo "$LOGS" | grep -q "$SUCCESS_PATTERN"; then
            echo "✅ Migrations ran successfully"
            echo ""
            echo "Migration log:"
            echo "$LOGS" | grep -iE "migration|alembic|upgrade|Running" || true
          else
            echo "⚠️  No migration activity detected (pattern '$SUCCESS_PATTERN' not found)"
            echo "   This may be expected if migrations were already up to date"
          fi

      - name: 🌐 HTTP health endpoint checks
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          ENDPOINTS='${{ inputs.healthcheck_endpoints }}'
          MAX_RETRIES=${{ inputs.max_retries }}
          DELAY=${{ inputs.retry_delay_seconds }}
          FAILED=0

          if [ "$ENDPOINTS" = "{}" ] || [ -z "$ENDPOINTS" ]; then
            echo "⏭️  No HTTP healthcheck endpoints configured, skipping"
            exit 0
          fi

          echo "🌐 Running HTTP health endpoint checks..."
          echo ""

          # Parse JSON and resolve random ports via docker compose port
          ENTRIES=$(python3 -c "
          import json
          endpoints = json.loads('$ENDPOINTS')
          for svc, spec in endpoints.items():
              container_port, path = spec.split(':', 1)
              print(f'{svc}|{container_port}|{path}')
          ")

          while IFS='|' read -r svc container_port path; do
            [ -z "$svc" ] && continue

            # Resolve the randomly assigned host port
            HOST_ADDR=$(docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json port "$svc" "$container_port" 2>/dev/null)

            if [ -z "$HOST_ADDR" ]; then
              echo "❌ $svc — could not resolve host port for container port $container_port"
              FAILED=$((FAILED + 1))
              continue
            fi

            URL="http://$HOST_ADDR$path"
            echo -n "⏳ $svc ($URL) — "
            attempt=1
            SUCCESS=false
            while [ "$attempt" -le "$MAX_RETRIES" ]; do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$URL" 2>/dev/null || echo "000")

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
                echo "✅ HTTP $HTTP_CODE"
                SUCCESS=true
                break
              fi

              echo -n "."
              sleep "$DELAY"
              attempt=$((attempt + 1))
            done

            if [ "$SUCCESS" = "false" ]; then
              echo " ❌ failed (last HTTP code: $HTTP_CODE)"
              FAILED=$((FAILED + 1))
            fi
          done <<< "$ENTRIES"

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED HTTP healthcheck(s) failed"
            exit 1
          fi
          echo "✅ All HTTP health endpoints responding"

      - name: 📊 Smoke test summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "=========================================="
            echo "✅ SMOKE TEST PASSED"
            echo "=========================================="
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "=========================================="
            echo "❌ SMOKE TEST FAILED"
            echo "=========================================="
            echo "result=failed" >> $GITHUB_OUTPUT
          fi
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 📋 Show logs on failure
        if: failure()
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          SERVICES="${{ steps.discover.outputs.services }}"

          echo "=========================================="
          echo "📋 Container logs (failure diagnostics)"
          echo "=========================================="

          IFS=',' read -ra SVC_LIST <<< "$SERVICES"
          for svc in "${SVC_LIST[@]}"; do
            svc=$(echo "$svc" | xargs)
            echo ""
            echo "--- $svc ---"
            docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json logs --tail=80 "$svc" 2>/dev/null || echo "⚠️  Unable to fetch logs"
          done

          echo ""
          echo "📊 Final container status:"
          docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json ps || true

      - name: 🧹 Tear down smoke stack
        if: always()
        working-directory: ${{ steps.set_workdir.outputs.workdir }}
        run: |
          echo "🧹 Tearing down smoke stack..."
          docker compose -p "$SMOKE_PROJECT" -f smoke-compose.json down -v --remove-orphans --rmi local 2>/dev/null || true

          # Remove any dangling images left behind by the build
          docker image prune -f --filter "label=com.docker.compose.project=$SMOKE_PROJECT" 2>/dev/null || true

          rm -f smoke-compose.json .env.smoke 2>/dev/null || true
          rm -rf "${{ github.workspace }}/.workflows" 2>/dev/null || true
          echo "✅ Smoke stack cleaned up (containers, volumes, and images removed)"
