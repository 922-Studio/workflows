name: Frontend Tests (Node + Vitest)

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20.x'
        description: 'Node.js version to use'
      lockfile_name:
        required: false
        type: string
        default: 'package-lock.json'
        description: 'Lockfile name for cache key hashing (e.g. package-lock.json or pnpm-lock.yaml)'
      enable_corepack:
        required: false
        type: boolean
        default: false
        description: 'Enable corepack for pnpm/yarn support (runs corepack enable before install)'
      working_directory:
        required: false
        type: string
        default: '.'
        description: 'Path to the app code relative to repo root'
      install_command:
        required: false
        type: string
        default: 'npm ci'
        description: 'Command to install project + test dependencies'
      test_command:
        required: false
        type: string
        default: 'npm run test:ci'
        description: 'Command to run the frontend test suite in CI mode'
      build_command:
        required: false
        type: string
        default: 'npm run build'
        description: 'Command to build the frontend application'
      run_build:
        required: false
        type: boolean
        default: true
        description: 'Whether to run the build_command after tests to ensure the app compiles'
      enable_notifications:
        required: false
        type: boolean
        default: false
        description: 'Whether to send notifications via send-notification workflow on test failure'
      notification_recipients:
        required: false
        type: string
        default: '["gregor160505@gmail.com"]'
        description: 'JSON array of email addresses for failure notifications'
      allure_results_dir:
        required: false
        type: string
        default: 'reports/allure'
        description: 'Directory where Vitest should write Allure results (set via ALLURE_RESULTS_DIR env var)'
      allure_server_url:
        required: false
        type: string
        default: 'http://home-lab:5050'
        description: 'Base URL of the Allure results server (e.g. allure-docker-service)'
      allure_project_id:
        required: false
        type: string
        default: 'homeui-unit'
        description: 'Project identifier on the Allure server'
      allure_launch_name:
        required: false
        type: string
        default: ''
        description: 'Optional launch name/label for this test run'
      env_file_source:
        required: false
        type: string
        default: ''
        description: 'Absolute path to a .env file on the runner to copy into the workspace before tests'
      coverage_fail_under:
        required: false
        type: number
        default: 0
        description: 'Minimum coverage percentage to enforce (0 disables). Used only for Pushgateway reporting.'
      pushgateway_url:
        required: false
        type: string
        default: ''
        description: 'Pushgateway base URL for pushing coverage metrics (leave empty to skip)'
    secrets:
      ALLURE_TOKEN:
        required: false
        description: 'Auth token for the Allure server (if required)'
      GMAIL_APP_PASSWORD:
        required: false
        description: 'Gmail App Password for SMTP authentication (used for failure notifications)'
      DISCORD_BOT_TOKEN:
        required: false
        description: 'Discord bot token (used for failure notifications)'
      PAT_GITHUB:
        required: false
        description: 'Personal Access Token to clone private repos (used to fetch workflows repo)'

jobs:
  tests:
    runs-on: self-hosted

    outputs:
      failed_tests: ${{ steps.test_summary.outputs.failed_tests }}
      total_tests: ${{ steps.test_summary.outputs.total_tests }}

    steps:
      - name: Log frontend test workflow inputs
        run: |
          echo "Node version: ${{ inputs.node_version }}"
          echo "Working directory: ${{ inputs.working_directory }}"
          echo "Install command: ${{ inputs.install_command }}"
          echo "Test command: ${{ inputs.test_command }}"
          echo "Build command: ${{ inputs.build_command }} (run_build=${{ inputs.run_build }})"
          echo "Allure results dir: ${{ inputs.allure_results_dir }}"
          echo "Allure server: ${{ inputs.allure_server_url }}"
          echo "Allure project id: ${{ inputs.allure_project_id }}"

      # ── Checkout workflow scripts (for upload_allure_results.py) ─────────────
      - name: Checkout Workflow Scripts
        uses: actions/checkout@v5
        with:
          repository: 922-Studio/workflows
          ref: main
          path: workflow-scripts
          token: ${{ secrets.PAT_GITHUB }}

      - name: Checkout Application Code
        uses: actions/checkout@v5
        with:
          # When this workflow is used via `uses: org/workflows/.github/workflows/frontend-tests.yml@...`,
          # this checks out the *calling* repository (your frontend project)
          fetch-depth: 0
          path: app-code

      - name: Copy .env from runner
        if: inputs.env_file_source != ''
        run: |
          echo "📋 Copying .env from ${{ inputs.env_file_source }}..."
          cp "${{ inputs.env_file_source }}" app-code/.env
          echo "✅ .env file copied into workspace."

      - name: Resolve effective app directory
        id: paths
        run: |
          WD="${{ inputs.working_directory }}"
          if [ "$WD" = "." ] || [ -z "$WD" ]; then
            echo "app_dir=app-code" >> "$GITHUB_OUTPUT"
          else
            echo "app_dir=app-code/$WD" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}

      - name: Enable corepack (pnpm/yarn)
        if: inputs.enable_corepack
        run: |
          corepack enable
          echo "✅ Corepack enabled."

      - name: Clean stale node_modules outside app dir
        run: |
          # Prevent Vite/Node from resolving modules from a leftover
          # node_modules at the workspace root (outside app-code/).
          if [ -d "node_modules" ] && [ "${{ steps.paths.outputs.app_dir }}" != "." ]; then
            echo "🧹 Removing stale node_modules at workspace root..."
            rm -rf node_modules
          fi

      - name: Restore node_modules (local disk cache)
        id: npm-cache
        run: |
          CACHE_BASE="/home/lab/runner-cache/node-modules"
          mkdir -p "$CACHE_BASE"
          LOCKFILE="${{ steps.paths.outputs.app_dir }}/${{ inputs.lockfile_name }}"
          HASHSRC=$([ -f "$LOCKFILE" ] && echo "$LOCKFILE" || echo "${{ steps.paths.outputs.app_dir }}/package.json")
          HASH=$(sha256sum "$HASHSRC" | awk '{print $1}')
          CACHE_PATH="$CACHE_BASE/$HASH"
          echo "cache_path=$CACHE_PATH" >> "$GITHUB_ENV"
          if [ -d "$CACHE_PATH" ]; then
            echo "🎯 Cache hit — restoring node_modules from local disk..."
            cp -al "$CACHE_PATH" "${{ steps.paths.outputs.app_dir }}/node_modules"
            # Remove Vite's transform cache — it contains absolute paths from the
            # run that created the cache and would cause Vitest resolver failures
            # on any other runner or workspace path.
            rm -rf "${{ steps.paths.outputs.app_dir }}/node_modules/.vite"

            # Validate restored cache: spot-check that top-level packages from
            # package.json actually exist in node_modules.  A cache entry can be
            # stale if it was saved from a partial install or before a new
            # dependency was added while the lockfile hash stayed the same.
            MISSING=0
            PKG="${{ steps.paths.outputs.app_dir }}/package.json"
            NM="${{ steps.paths.outputs.app_dir }}/node_modules"
            for dep in $(node -e "
              const p = require('./' + process.argv[1]);
              const deps = Object.keys(p.dependencies || {}).concat(Object.keys(p.devDependencies || {}));
              console.log(deps.join('\n'));
            " "$PKG" 2>/dev/null); do
              if [ ! -d "$NM/$dep" ] && [ ! -f "$NM/$dep" ]; then
                echo "⚠️  Missing package in cache: $dep"
                MISSING=1
              fi
            done

            if [ "$MISSING" -eq 1 ]; then
              echo "❌ Cache is stale — deleting cached entry and forcing fresh install."
              rm -rf "$NM" "$CACHE_PATH"
              echo "npm_cache_hit=false" >> "$GITHUB_OUTPUT"
            else
              echo "npm_cache_hit=true" >> "$GITHUB_OUTPUT"
              echo "✅ Done (local I/O only, no network). All packages validated."
            fi
          else
            echo "❌ Cache miss — will run install."
            echo "npm_cache_hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install project dependencies
        if: steps.npm-cache.outputs.npm_cache_hit != 'true'
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          echo "📦 Installing project dependencies..."
          echo "Running: ${{ inputs.install_command }}"
          set -e
          eval "${{ inputs.install_command }}"
          echo "✅ Project dependencies installed."

      - name: Save node_modules to local disk cache
        if: steps.npm-cache.outputs.npm_cache_hit != 'true'
        run: |
          CACHE_PATH="${{ env.cache_path }}"
          if [ ! -d "$CACHE_PATH" ]; then
            echo "💾 Saving node_modules to local disk cache..."
            TEMP="${CACHE_PATH}.tmp.$$"
            cp -a "${{ steps.paths.outputs.app_dir }}/node_modules" "$TEMP"
            mv "$TEMP" "$CACHE_PATH" 2>/dev/null || rm -rf "$TEMP"
            echo "✅ Saved to: $CACHE_PATH"
            # Keep only 5 most recent cache versions
            ls -1dt /home/lab/runner-cache/node-modules/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf
          else
            echo "Cache already populated (parallel runner race handled)."
          fi

      - name: Run frontend tests
        id: run_tests
        working-directory: ${{ steps.paths.outputs.app_dir }}
        env:
          CI: true
          ALLURE_RESULTS_DIR: ${{ inputs.allure_results_dir }}
        run: |
          echo "🧪 Running frontend tests..."
          echo "Command: ${{ inputs.test_command }}"
          set -e
          mkdir -p "$ALLURE_RESULTS_DIR" reports
          eval "${{ inputs.test_command }}"
          echo "✅ Frontend tests completed."

      - name: Run frontend build (optional)
        if: inputs.run_build
        working-directory: ${{ steps.paths.outputs.app_dir }}
        env:
          CI: true
        run: |
          echo "🏗️  Building frontend application..."
          echo "Command: ${{ inputs.build_command }}"
          set -e
          eval "${{ inputs.build_command }}"
          echo "✅ Frontend build completed."

      - name: Compute test summary (failed/total) from JUnit, if present
        id: test_summary
        if: always()
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          python3 - << 'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("reports/junit.xml")
          failed = 0
          total = 0

          if junit_path.exists():
              tree = ET.parse(junit_path)
              root = tree.getroot()

              if root.tag == "testsuites":
                  suites = root.findall("testsuite")
              elif root.tag == "testsuite":
                  suites = [root]
              else:
                  suites = []

              for ts in suites:
                  total += int(ts.attrib.get("tests", 0))
                  failed += int(ts.attrib.get("failures", 0)) + int(ts.attrib.get("errors", 0))

          print(f"Total tests: {total}")
          print(f"Failed tests: {failed}")

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"failed_tests={failed}\n")
              fh.write(f"total_tests={total}\n")
          PY

      # ── Upload Allure results to external server ──────────────────────────────
      - name: Upload Allure results to Allure server
        if: always()
        env:
          ALLURE_RESULTS_DIR: ${{ steps.paths.outputs.app_dir }}/${{ inputs.allure_results_dir }}
          ALLURE_SERVER_URL: ${{ inputs.allure_server_url }}
          ALLURE_PROJECT_ID: ${{ inputs.allure_project_id }}
          ALLURE_LAUNCH_NAME: ${{ inputs.allure_launch_name }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: |
          set -e
          echo "🚀 Uploading Allure unit test results to server..."
          python3 workflow-scripts/.github/scripts/upload_allure_results.py

      - name: Upload test artifacts (if present)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ inputs.allure_project_id }}
          path: |
            ${{ steps.paths.outputs.app_dir }}/reports/junit.xml
            ${{ steps.paths.outputs.app_dir }}/reports/cobertura-coverage.xml
            ${{ steps.paths.outputs.app_dir }}/${{ inputs.allure_results_dir }}
          if-no-files-found: ignore

      - name: 📊 Check coverage threshold and push to Prometheus Pushgateway
        if: inputs.pushgateway_url != '' && (success() || failure())
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          COVERAGE_XML="reports/cobertura-coverage.xml"
          if [ ! -f "$COVERAGE_XML" ]; then
            echo "⚠️  No cobertura-coverage.xml found — skipping Pushgateway push."
            exit 0
          fi

          LINE_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$COVERAGE_XML')
          print(tree.getroot().attrib.get('line-rate', '0'))
          ")
          COVERAGE_PCT=$(python3 -c "print(round(float('$LINE_RATE') * 100, 2))")

          echo "📊 Coverage: ${COVERAGE_PCT}% — pushing to Pushgateway..."
          cat <<PROM | curl -s --data-binary @- "${{ inputs.pushgateway_url }}/metrics/job/ci/project/${{ inputs.allure_project_id }}"
          # TYPE test_coverage_percentage gauge
          test_coverage_percentage{project="${{ inputs.allure_project_id }}"} $COVERAGE_PCT
          PROM
          echo "✅ Coverage metric pushed to Pushgateway."

      - name: 🔔 Notify coverage below threshold
        if: inputs.pushgateway_url != '' && inputs.coverage_fail_under > 0 && (success() || failure())
        working-directory: ${{ steps.paths.outputs.app_dir }}
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          COVERAGE_XML="reports/cobertura-coverage.xml"
          if [ ! -f "$COVERAGE_XML" ]; then exit 0; fi

          LINE_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$COVERAGE_XML')
          print(tree.getroot().attrib.get('line-rate', '0'))
          ")
          COVERAGE_PCT=$(python3 -c "print(round(float('$LINE_RATE') * 100, 2))")
          THRESHOLD=${{ inputs.coverage_fail_under }}

          if python3 -c "exit(0 if float('$COVERAGE_PCT') < float('$THRESHOLD') else 1)"; then
            echo "⚠️  Coverage ${COVERAGE_PCT}% is below threshold ${THRESHOLD}%"
            if [ -n "$DISCORD_BOT_TOKEN" ]; then
              python3 -c "
          import json, urllib.request
          webhook_url = 'https://discord.com/api/webhooks'
          # Coverage below threshold — rely on CI status check to enforce
          print(f'Coverage {float(\"$COVERAGE_PCT\"):.1f}% < {float(\"$THRESHOLD\"):.0f}% threshold for ${{ inputs.allure_project_id }}')
          "
            fi
          else
            echo "✅ Coverage ${COVERAGE_PCT}% meets threshold ${THRESHOLD}%"
          fi
