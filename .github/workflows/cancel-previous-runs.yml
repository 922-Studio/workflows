name: Cancel Previous Runs

on:
  workflow_call: {}

jobs:
  cancel:
    runs-on: self-hosted
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const workflowRef = context.workflow_ref;
            // workflowRef format: "owner/repo/.github/workflows/deploy.yml@refs/heads/main"
            const workflowFile = workflowRef.split('/').pop().split('@')[0];

            const branch = context.ref_name;

            core.info(`Cancelling previous runs of ${workflowFile} on branch ${branch}`);
            core.info(`Current run ID: ${context.runId} (will be excluded)`);

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
              branch: branch,
              per_page: 100,
            });

            const toCancel = runs.filter(run =>
              (run.status === 'in_progress' || run.status === 'queued') &&
              run.id !== context.runId
            );

            core.info(`Found ${toCancel.length} run(s) to cancel`);

            for (const run of toCancel) {
              try {
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
                core.info(`Cancelled run ${run.id} (status: ${run.status})`);
              } catch (err) {
                core.warning(`Could not cancel run ${run.id}: ${err.message}`);
              }
            }
