name: Python Tests (pytest + coverage + Allure)

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.13'
        description: 'Python version to use'
      working_directory:
        required: false
        type: string
        default: '.'
        description: 'Path to the app code relative to repo root'
      install_command:
        required: false
        type: string
        default: 'pip install -r requirements.txt -r requirements-test.txt'
        description: 'Command to install project + test dependencies'
      pytest_args:
        required: false
        type: string
        default: ''
        description: 'Extra arguments to pass to pytest (e.g. -m "not slow")'
      coverage_package:
        required: false
        type: string
        default: 'app'
        description: 'Package/module to measure coverage on (passed to --cov)'
      coverage_fail_under:
        required: false
        type: number
        default: 0
        description: 'Minimum coverage percentage to enforce (0 disables enforcement)'
      allure_results_dir:
        required: false
        type: string
        default: 'reports/allure'
        description: 'Directory where pytest should write Allure results'
      allure_server_url:
        required: false
        type: string
        default: 'http://home-lab:5050'
        description: 'Base URL of the Allure results server (e.g. allure-docker-service)'
      allure_project_id:
        required: false
        type: string
        default: 'home-api'
        description: 'Project identifier on the Allure server'
      allure_launch_name:
        required: false
        type: string
        default: ''
        description: 'Optional launch name/label for this test run'
      api_base_url:
        required: true
        type: string
        description: 'Value for API_BASE_URL during tests'
      github_owner:
        required: true
        type: string
        description: 'Value for GITHUB_OWNER during tests'
      github_repo:
        required: true
        type: string
        description: 'Value for GITHUB_REPO during tests'
      google_sheet_id:
        required: true
        type: string
        description: 'Value for GOOGLE_SHEET_ID during tests'
      google_service_account_file:
        required: true
        type: string
        description: 'Value for GOOGLE_SERVICE_ACCOUNT_FILE during tests'
      database_url:
        required: true
        type: string
        description: 'Value for DATABASE_URL during tests'
      discord_bot_token:
        required: true
        type: string
        description: 'Value for DISCORD_BOT_TOKEN during tests'
      github_token:
        required: false
        type: string
        default: ''
        description: 'Value for GITHUB_TOKEN during tests (optional, use dummy or real token)'
      env_file_source:
        required: false
        type: string
        default: ''
        description: 'Absolute path to a .env file on the runner to copy into the workspace before tests'
    secrets:
      ALLURE_TOKEN:
        required: false
        description: 'Auth token for the Allure server (if required)'
      GEMINI_API_KEY:
        required: false
        description: 'Gemini API key to expose as GEMINI_API_KEY during tests'
      GMAIL_APP_PASSWORD:
        required: false
        description: 'Gmail App Password for SMTP authentication (used for failure notifications)'
      DISCORD_BOT_TOKEN:
        required: false
        description: 'Discord bot token (used for failure notifications)'
      PAT_GITHUB:
        required: false
        description: 'Personal Access Token to clone private repos (used to fetch workflows repo)'

jobs:
  tests:
    runs-on: self-hosted

    outputs:
      failed_tests: ${{ steps.test_summary.outputs.failed_tests }}
      total_tests: ${{ steps.test_summary.outputs.total_tests }}

    env:
      # Base environment derived from caller inputs/secrets
      API_BASE_URL: ${{ inputs.api_base_url }}
      GITHUB_OWNER: ${{ inputs.github_owner }}
      GITHUB_REPO: ${{ inputs.github_repo }}
      GOOGLE_SHEET_ID: ${{ inputs.google_sheet_id }}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ inputs.google_service_account_file }}
      DATABASE_URL: ${{ inputs.database_url }}
      DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
      GITHUB_TOKEN: ${{ inputs.github_token }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Log test workflow inputs
        run: |
          echo "Python version: ${{ inputs.python_version }}"
          echo "Working directory: ${{ inputs.working_directory }}"
          echo "Coverage target: ${{ inputs.coverage_package }} (min: ${{ inputs.coverage_fail_under }}%)"
          echo "Allure results dir: ${{ inputs.allure_results_dir }}"
          echo "Allure server: ${{ inputs.allure_server_url }}"
          echo "Allure project id: ${{ inputs.allure_project_id }}"

      - name: Checkout Workflow Scripts
        uses: actions/checkout@v5
        with:
          repository: 922-Studio/workflows
          ref: main
          path: workflow-scripts
          token: ${{ secrets.PAT_GITHUB }}

      - name: Checkout Application Code
        uses: actions/checkout@v5
        with:
          # When this workflow is used via `uses: org/workflows/.github/workflows/python-tests.yml@...`,
          # this checks out the *calling* repository (your API project)
          fetch-depth: 0
          path: app-code

      - name: Copy .env from runner
        if: inputs.env_file_source != ''
        run: |
          echo "📋 Copying .env from ${{ inputs.env_file_source }}..."
          cp "${{ inputs.env_file_source }}" app-code/.env
          echo "✅ .env file copied into workspace."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install project dependencies
        working-directory: ./app-code
        run: |
          echo "📦 Installing project dependencies..."
          echo "Running: ${{ inputs.install_command }}"
          set -e
          eval "${{ inputs.install_command }}"
          echo "✅ Project dependencies installed."

      - name: Install test tooling (pytest, coverage, allure)
        working-directory: ./app-code
        run: |
          echo "📦 Ensuring pytest + coverage + allure plugins are installed..."
          pip install --upgrade pip
          pip install 'pytest>=9.0.0' pytest-cov allure-pytest
          echo "✅ Test tooling installed."

      - name: Run pytest with coverage + Allure
        id: run_pytest
        working-directory: ./app-code
        env:
          ALLURE_RESULTS_DIR: ${{ inputs.allure_results_dir }}
          COVERAGE_PKG: ${{ inputs.coverage_package }}
          COVERAGE_FAIL_UNDER: ${{ inputs.coverage_fail_under }}
        run: |
          set -e
          echo "🧪 Running pytest with coverage and Allure..."
          mkdir -p "$ALLURE_RESULTS_DIR" reports

          JUNIT_XML="reports/junit.xml"

          # Build coverage args
          COV_ARGS="--cov=$COVERAGE_PKG --cov-report=xml:reports/coverage.xml"
          if [ "$COVERAGE_FAIL_UNDER" != "0" ]; then
            COV_ARGS="$COV_ARGS --cov-fail-under=$COVERAGE_FAIL_UNDER"
          fi

          echo "pytest $COV_ARGS --alluredir=$ALLURE_RESULTS_DIR --junitxml=$JUNIT_XML ${{ inputs.pytest_args }}"

          pytest \
            $COV_ARGS \
            --alluredir="$ALLURE_RESULTS_DIR" \
            --junitxml="$JUNIT_XML" \
            ${{ inputs.pytest_args }}

          echo "✅ Pytest run completed."

      - name: Compute pytest summary (failed/total)
        id: test_summary
        if: always()
        working-directory: ./app-code
        run: |
          python - << 'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("reports/junit.xml")
          failed = 0
          total = 0

          if junit_path.exists():
              tree = ET.parse(junit_path)
              root = tree.getroot()

              if root.tag == "testsuites":
                  suites = root.findall("testsuite")
              elif root.tag == "testsuite":
                  suites = [root]
              else:
                  suites = []

              for ts in suites:
                  total += int(ts.attrib.get("tests", 0))
                  failed += int(ts.attrib.get("failures", 0)) + int(ts.attrib.get("errors", 0))

          print(f"Total tests: {total}")
          print(f"Failed tests: {failed}")

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"failed_tests={failed}\n")
              fh.write(f"total_tests={total}\n")
          PY

      - name: Upload coverage and allure results as artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            app-code/${{ inputs.allure_results_dir }}
            app-code/reports/coverage.xml

      - name: Upload Allure results to external server
        if: always()
        env:
          # Use app-code/<dir> so the script sees the real path
          ALLURE_RESULTS_DIR: app-code/${{ inputs.allure_results_dir }}
          ALLURE_SERVER_URL: ${{ inputs.allure_server_url }}
          ALLURE_PROJECT_ID: ${{ inputs.allure_project_id }}
          ALLURE_LAUNCH_NAME: ${{ inputs.allure_launch_name }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: |
          set -e
          echo "🚀 Preparing Allure results for upload (via Python helper)..."
          python3 workflow-scripts/.github/scripts/upload_allure_results.py

