name: Semantic Versioning

on:
  workflow_call:
    inputs:
      use_ai:
        description: "Use Gemini AI for version determination. When false (default), uses conventional commit prefix parsing instead."
        type: boolean
        default: false
    secrets:
      gemini_api_key:
        required: false
        description: "Required when use_ai is true. Omit for conventional-commit mode."
      PAT_GITHUB:
        required: true
        description: "Personal Access Token to clone private repos"
    outputs:
      new_version:
        value: ${{ jobs.version.outputs.new_version }}

jobs:
  version:
    runs-on: polaris
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.resolve.outputs.new_version }}
    steps:
      - name: 🧹 Clean stale git worktrees
        run: |
          if [ -d "${{ github.workspace }}" ] && [ -d "${{ github.workspace }}/.git" ]; then
            git -C "${{ github.workspace }}" worktree prune || true
          fi

      # 1. Checkout the Application Code (HomeAPI)
      # We need this to get the git history/tags of the app being deployed
      - name: Checkout Application Code
        uses: actions/checkout@v5
        with:
          path: app-code
          token: ${{ secrets.PAT_GITHUB }}
          # Full history + tags so version/tag computation is deterministic on a
          # fresh runner. A shallow, tag-less checkout hides existing tags, which
          # makes the tag-existence guard below miss them and push a duplicate tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout Workflow Scripts
        uses: actions/checkout@v5
        with:
          repository: 922-Studio/workflows
          ref: main
          path: workflow-scripts
          token: ${{ secrets.PAT_GITHUB }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: inputs.use_ai == 'true'
        run: |
          echo "📦 Installing AI dependencies..."
          pip install google-generativeai
          echo "✅ AI dependencies installed."

      - name: Get commit messages
        id: commit_messages
        working-directory: ./app-code
        run: |
          echo "📝 Getting commit messages..."
          COMMITS=$(git log -1 --pretty=format:"%s%n%b")
          DELIM=$(openssl rand -hex 8)
          echo "commits<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT
          echo "✅ Commit messages gathered."

      - name: Check for new commits
        id: commit_check
        working-directory: ./app-code
        run: |
          echo "🔎 Checking for new commits..."
          if [ -z "${{ steps.commit_messages.outputs.commits }}" ]; then
            echo "No new commits found. Skipping version bump."
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
          else
            echo "New commits found. Proceeding with version bump."
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for [ci skip]
        id: ci_skip_check
        if: steps.commit_check.outputs.has_new_commits == 'true'
        working-directory: ./app-code
        run: |
          echo "🔎 Checking for [ci skip]..."
          if git log -1 --pretty=%B | grep -q "\[ci skip\]"; then
            echo "ci_skip=true" >> $GITHUB_OUTPUT
            echo "Found [ci skip] in last commit message. Skipping version bump."
          else
            echo "ci_skip=false" >> $GITHUB_OUTPUT
            echo "No [ci skip] found. Proceeding..."
          fi

      - name: Determine next version
        if: steps.ci_skip_check.outputs.ci_skip == 'false' && steps.commit_check.outputs.has_new_commits == 'true'
        id: version
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_api_key }}
          COMMITS: ${{ steps.commit_messages.outputs.commits }}
        run: |
          echo "🔍 Determining next version..."
          USE_AI_FLAG=""
          if [ "${{ inputs.use_ai }}" == "true" ]; then
            USE_AI_FLAG="--use-ai"
          fi
          NEXT_VERSION=$(python workflow-scripts/.github/scripts/determine_version.py \
            --commits "$COMMITS" \
            --version-file app-code/version.txt \
            $USE_AI_FLAG)
          echo "new_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Next version determined: $NEXT_VERSION"

      - name: Update version file
        if: steps.version.outputs.new_version != ''
        working-directory: ./app-code
        run: |
          echo "📝 Updating version file to ${{ steps.version.outputs.new_version }}..."
          echo "${{ steps.version.outputs.new_version }}" > version.txt
          echo "✅ Version file updated."

      - name: Configure Git
        if: steps.version.outputs.new_version != ''
        working-directory: ./app-code
        run: |
          echo "🔧 Configuring Git..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git configured."

      - name: Commit and push version file
        if: steps.version.outputs.new_version != ''
        working-directory: ./app-code
        run: |
          echo "📤 Committing and pushing version file..."
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          git add version.txt
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to version file. Skipping commit."
            exit 0
          fi

          git commit -m "chore: Update version to $NEW_VERSION [ci skip]"

          # Retry loop: push, and if remote moved, rebase with conflict resolution
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "✅ Version file committed and pushed."
              exit 0
            fi

            echo "⚠️  Push failed (attempt $attempt/$MAX_RETRIES), rebasing on remote..."
            if git pull --rebase; then
              echo "✅ Rebase succeeded cleanly"
            else
              echo "🔧 Rebase conflict in version.txt — resolving with $NEW_VERSION"
              echo "$NEW_VERSION" > version.txt
              git add version.txt
              GIT_EDITOR=true git rebase --continue
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1

      - name: Create and push tag
        if: steps.version.outputs.new_version != ''
        working-directory: ./app-code
        run: |
          echo "🏷️ Creating and pushing tag v${{ steps.version.outputs.new_version }}..."
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "ℹ️ Tag v${{ steps.version.outputs.new_version }} already exists. Skipping tag creation."
          else
            git tag "v${{ steps.version.outputs.new_version }}"
            git push origin "v${{ steps.version.outputs.new_version }}"
            echo "✅ Tag created and pushed."
          fi

      # Always emit a usable version. The "Determine next version" step is skipped
      # whenever the triggering commit carries [ci skip] (e.g. a workflow_dispatch
      # re-run on top of a "chore: Update version" bump commit) or when there are no
      # new commits. In those cases steps.version.outputs.new_version is empty, which
      # callers interpolate into image tags as "<env>-v" (malformed). Fall back to the
      # current version.txt — and, only if that is missing, to the latest existing
      # semver tag — so the output is always a real version and tags stay well-formed.
      - name: Resolve output version
        id: resolve
        working-directory: ./app-code
        run: |
          if [ -n "${{ steps.version.outputs.new_version }}" ]; then
            RESOLVED="${{ steps.version.outputs.new_version }}"
            echo "✅ Using freshly determined version: $RESOLVED"
          else
            RESOLVED="$(tr -d '[:space:]' < version.txt 2>/dev/null || true)"
            if [ -n "$RESOLVED" ]; then
              echo "ℹ️ No version bump this run (ci skip / no new commits); using current version.txt: $RESOLVED"
            else
              # version.txt missing or empty — fall back to the latest existing semver tag
              # (full tag history is available because the checkout uses fetch-tags: true).
              RESOLVED="$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | sed 's/^v//')"
              echo "ℹ️ version.txt missing/empty; falling back to latest tag: ${RESOLVED:-<none>}"
            fi
          fi
          if [ -z "$RESOLVED" ]; then
            echo "❌ Could not resolve a version (no bump, no version.txt, no tags)." >&2
            exit 1
          fi
          echo "new_version=$RESOLVED" >> "$GITHUB_OUTPUT"
